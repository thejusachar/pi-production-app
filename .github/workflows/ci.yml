# ═══════════════════════════════════════════════════════════════════════════
#  ci.yml  —  Continuous Integration
#
#  Runs on every push and pull request.
#  Checks that:
#    1. Python backend imports cleanly (syntax / import errors caught early)
#    2. Docker images build successfully for both amd64 and arm64
#
#  This does NOT push to Docker Hub — that is done by release.yml on tags.
# ═══════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & basic checks ─────────────────────────────────────────────
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check Python syntax (pyflakes)
        run: |
          pip install pyflakes
          python -m pyflakes backend/app/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend (catches JSX/import errors)
        run: |
          cd frontend
          npm run build

  # ── Job 2: Docker build test ───────────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint   # only run if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Enable multi-platform builds (needed to test arm64 for Raspberry Pi)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: prod
          platforms: linux/amd64,linux/arm64
          push: false    # just build, don't push

      - name: Build frontend image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: prod
          platforms: linux/amd64,linux/arm64
          push: false    # just build, don't push
