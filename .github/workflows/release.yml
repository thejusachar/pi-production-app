# ═══════════════════════════════════════════════════════════════════════════
#  release.yml  —  Build, Push, and Deploy on Version Tag
#
#  Triggered when you push a Git tag like:  v1.2.3
#
#  Two jobs:
#    1. build-push  → runs on GitHub servers: builds images, pushes to Docker Hub
#    2. deploy      → runs ON the Raspberry Pi (self-hosted runner): pulls & restarts
#
#  Required GitHub Secrets:
#    DOCKER_HUB_USERNAME  →  your Docker Hub username
#    DOCKER_HUB_TOKEN     →  Docker Hub access token (not your password)
# ═══════════════════════════════════════════════════════════════════════════

name: Release & Deploy

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # matches v1.0.0, v2.3.1, etc.

jobs:
  # ── Job 1: Build and push images (runs on GitHub's servers) ──────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: prod
          platforms: linux/amd64,linux/arm/v7   # arm/v7 = 32-bit Raspbian
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/pi-production-backend:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/pi-production-backend:latest
          build-args: |
            APP_VERSION=${{ steps.version.outputs.VERSION }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: prod
          platforms: linux/amd64,linux/arm/v7   # arm/v7 = 32-bit Raspbian
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/pi-production-frontend:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/pi-production-frontend:latest

  # ── Job 2: Deploy (runs DIRECTLY on the Raspberry Pi) ────────────────────
  deploy:
    name: Deploy to Raspberry Pi
    runs-on: [self-hosted, pi]   # ← this job runs on YOUR Pi, not GitHub servers
    needs: build-push             # wait for images to be pushed first

    steps:
      - name: Pull new images
        run: |
          cd ~/pi-production-app
          echo "IMAGE_TAG=${{ needs.build-push.outputs.version }}" > .env
          echo "DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}" >> .env
          docker compose -f docker-compose.prod.yml pull

      - name: Restart containers
        run: |
          cd ~/pi-production-app
          docker compose -f docker-compose.prod.yml up -d --no-build

      - name: Clean up old images
        run: docker image prune -f

      - name: Verify deployment
        run: |
          sleep 10
          curl -f http://localhost/api/health
          echo "Deployed version ${{ needs.build-push.outputs.version }} successfully"
