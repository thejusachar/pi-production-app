# ═══════════════════════════════════════════════════════════════════════════
#  docker-compose.prod.yml  —  PRODUCTION / RASPBERRY PI
#
#  Uses pre-built images from Docker Hub (set IMAGE_TAG in .env).
#  Run on the Pi:
#    IMAGE_TAG=1.2.0 docker compose -f docker-compose.prod.yml up -d
#
#  URL on the Pi:
#    http://<pi-ip>        (frontend, port 80)
#    http://<pi-ip>:8000   (backend API direct — optional, can be removed)
# ═══════════════════════════════════════════════════════════════════════════

services:

  backend:
    image: ${DOCKER_HUB_USERNAME}/pi-production-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      APP_VERSION: "${IMAGE_TAG:-latest}"
    # Grant access to Pi GPIO hardware
    privileged: true
    devices:
      - /dev/gpiomem:/dev/gpiomem
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Uncomment to expose the API port directly (useful for debugging)
    # ports:
    #   - "8000:8000"

  frontend:
    image: ${DOCKER_HUB_USERNAME}/pi-production-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
