# ═══════════════════════════════════════════════════════════════════════════
#  docker-compose.yml  —  LOCAL DEVELOPMENT
#
#  Starts both services in "dev" mode with hot-reload.
#  Run:  docker compose up --build
#
#  URLs (on your Mac):
#    Frontend →  http://localhost:5173
#    Backend  →  http://localhost:8000
#    API docs →  http://localhost:8000/docs   (FastAPI Swagger UI)
# ═══════════════════════════════════════════════════════════════════════════

services:

  backend:
    build:
      context: ./backend
      target: dev          # ← uses the "dev" stage of the Dockerfile
    volumes:
      - ./backend/app:/app/app   # hot-reload: changes on disk = instant server update
    ports:
      - "8000:8000"
    environment:
      APP_VERSION: "1.0.0-dev"
    healthcheck:
      # Use Python instead of curl — curl is not in the slim image
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      target: dev          # ← uses the "dev" stage of the Dockerfile
    volumes:
      - ./frontend/src:/app/src   # hot-reload
      - ./frontend/public:/app/public
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: development
