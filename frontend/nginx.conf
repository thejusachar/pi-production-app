# Nginx config for serving the React build in production
# - Serves static files from /usr/share/nginx/html
# - Forwards all /api/* requests to the backend container
# - Uses "try_files" so React Router links work correctly

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React Router: return index.html for any unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service
    # "backend" is the service name defined in docker-compose.prod.yml
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
